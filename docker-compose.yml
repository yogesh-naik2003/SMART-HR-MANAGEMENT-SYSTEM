services:
  postgres:
    image: postgres:17
    container_name: hrms-postgres
    environment:
      POSTGRES_DB: hrms_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: hrms-redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: hrms-backend
    ports:
      - "5001:5000"
    depends_on:
      - postgres
      - redis
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: hrms_ai
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://redis:6379

  frontend:
    build: ./frontend
    container_name: hrms-frontend
    ports:
      - "3001:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5001/api

volumes:
  postgres_data:
